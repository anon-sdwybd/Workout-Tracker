<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workout Tracker</title>
    <link rel="stylesheet" href="CSS/style.css">
    <script src="JavaScript/script.js" defer></script>
</head>
<body>
    <main>
    <h1>Workout Tracker</h1>
    <div class="Container">
    <div class="FormCard">
        <form id="WorkoutForm">
        <label for="Exercise">Exercise:</label>
        <input type="text" id="Exercise"><br><br>

        <label for="Weight">Weight:</label>
        <input type="number" id="Weight"><br><br>

        <label for="Reps">Repetitions</label>
        <input type="number" id="Reps"><br><br>

        <label for="Sets">Sets:</label>
        <input type="number" id="Sets"><br><br>

        <button type="button" id="SubmitButton" onclick="AddWorkout()">Add Workout</button>
    </form>
    </div>

    <div id="WorkoutList">
        
    </div>
    </div>
    </main>
</body>
</html>
