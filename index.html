<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workout Tracker</title>
    <script src="JavaScript/script.js" defer></script>
</head>
<body>
    <h1>Workout Tracker</h1>
    
    <form id="WorkoutForm">
        <label for="Exercise">Exercise:</label>
        <input type="text" id="Exercise"><br><br>

        <label for="Weight">Weight:</label>
        <input type="number" id="Weight"><br><br>

        <label for="Reps">Repetitions</label>
        <input type="number" id="Reps"><br><br>

        <label for="Sets">Sets:</label>
        <input type="number" id="Sets">
    </form>
    <button type="button" id="SubmitButton" onclick="AddWorkout()">Submit</button>
    <div id="WorkoutList">

    </div>
</body>
</html>
